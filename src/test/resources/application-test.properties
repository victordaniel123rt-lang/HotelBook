spring.application.name=HotelBook
server.port: 9091
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=root2
spring.datasource.password=1469371
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Configuraciones de JPA / Hibernate para Oracle
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.show-sql=true
# Se utiliza el dialecto generico de Oracle que detecta automaticamente la version (Oracle 11g, 12c, 19c, 23c, etc.)
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# Configuracion del Pool de Conexiones (Hikari)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# Logs de depuracion para SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE